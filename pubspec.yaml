name: unispace
description: "UniSpace - Group Study Room Finder & Booking System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  gap: ^3.0.1
  cached_network_image: ^3.4.1
  fl_chart: ^0.69.2
  flutter_staggered_animations: ^1.1.1
  icons_plus: ^5.0.0

  # Backend
  supabase_flutter: ^2.8.4

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Utils
  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
